# XcodeGen manifest. `make project` regenerates Clack.xcodeproj from this.
# Keep the manifest as the source of truth — never edit the generated .xcodeproj
# by hand or the next `make project` will clobber it.
#
# Clack is a push-to-talk app — our answer to Apple retiring Walkie-Talkie in
# iOS 27. One target, built on Apple's PushToTalk framework (PTChannelManager)
# so transmissions ride the system PTT UI (lock screen banner, blue status
# pill, leading-button join) instead of a bespoke foreground hack.
#
#   Clack — the container app (App Store product). Channel list, the big
#           press-and-hold talk surface, and the PTChannelManager bridge.
#
# PushToTalk requires the `com.apple.developer.push-to-talk` entitlement, the
# `push-to-talk` background mode, and APNs (incoming transmissions arrive as
# pushtotalk-type pushes). Microphone access is obviously required too.

name: Clack
options:
  bundleIdPrefix: ltd.anti
  # 17.0 floor — our usual, and the right call for a Walkie-Talkie *replacement*
  # where reach across the displaced base matters. PushToTalk is iOS 16+ and
  # iUX-ios is 17+, so we lose nothing core. Glass is a progressive enhancement:
  # the UI gates `.glassEffect` behind `#available(iOS 26, *)` and falls back to
  # a solid fill below that.
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Same Apple Developer team as the rest of our apps. Xcode auto-generates a
    # development provisioning profile on demand. Override at build time with
    # `DEVELOPMENT_TEAM=<id>` on the xcodebuild command line if a fork needs a
    # different team.
    DEVELOPMENT_TEAM: 8248296AJX
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO

# Local SwiftPM dependency on the iOS UX library. iUX-ios lives one level up.
packages:
  iUX-ios:
    path: ../iUX-ios

targets:
  Clack:
    type: application
    platform: iOS
    sources:
      - Sources/Clack
      # Asset catalog must be a source (not a plain resource) so Xcode runs
      # actool over it and produces Assets.car in the bundle. As a plain
      # resource it would be copied verbatim and iOS wouldn't find the app icon.
      - Resources/Assets.xcassets
      - path: Resources/Privacy/App/PrivacyInfo.xcprivacy
        buildPhase: resources
    entitlements:
      path: Resources/Clack.entitlements
      properties:
        # The gate for Apple's PushToTalk framework. Provisioning must carry
        # the matching capability (Automatic signing requests it from the team).
        com.apple.developer.push-to-talk: true
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Clack
        ITSAppUsesNonExemptEncryption: false
        # PushToTalk delivers incoming transmissions while backgrounded; the
        # mic captures the user's own. Both strings are user-facing.
        NSMicrophoneUsageDescription: Clack uses the microphone so you can talk on your channels.
        UIBackgroundModes:
          - push-to-talk
          - audio
        # clack:// deep links (channel invites / marketing capture).
        CFBundleURLTypes:
          - CFBundleURLName: ltd.anti.clack
            CFBundleURLSchemes:
              - clack
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - package: iUX-ios
        product: iUXiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ltd.anti.clack
        TARGETED_DEVICE_FAMILY: "1,2"
        # Tell actool which appiconset in the catalog is the app icon.
        # `AppIcon` matches the directory name under Assets.xcassets.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
